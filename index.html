<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doodle Art</title>
    <link rel="stylesheet" href="/src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans selection:bg-indigo-500/30">
    <div id="app">
        <!-- Header -->
        <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i data-lucide="palette" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-400">AI Doodle Art</h1>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-medium">Transform Sketches to Masterpieces</p>
                    </div>
                </div>
                <button id="clearBtn" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 transition-all text-sm font-medium border border-zinc-700">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    New Sketch
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Canvas Section (Left 2/3) -->
                <div class="lg:col-span-2 space-y-4">
                    <div class="relative group">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-20 group-hover:opacity-30 transition duration-1000"></div>
                        <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                            <!-- Canvas Toolbar -->
                            <div class="absolute top-4 left-1/2 -translate-x-1/2 flex items-center gap-2 p-1.5 bg-zinc-900/90 backdrop-blur-md border border-zinc-700 rounded-xl shadow-xl z-10">
                                <div class="flex items-center gap-1 px-2 border-r border-zinc-700">
                                    <button id="brushTool" class="p-2 rounded-lg bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 transition-all">
                                        <i data-lucide="paintbrush" class="w-4 h-4"></i>
                                    </button>
                                    <button id="eraserTool" class="p-2 rounded-lg hover:bg-zinc-800 text-zinc-400 transition-all">
                                        <i data-lucide="eraser" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                
                                <div class="flex items-center gap-3 px-3 border-r border-zinc-700">
                                    <input type="color" id="colorPicker" value="#6366f1" class="w-6 h-6 rounded-full overflow-hidden border-0 p-0 bg-transparent cursor-pointer">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-zinc-500 uppercase">Size</span>
                                        <input type="range" id="brushSize" min="1" max="50" value="5" class="w-24 accent-indigo-500">
                                    </div>
                                </div>

                                <div class="flex items-center gap-1 px-2">
                                    <button id="undoBtn" class="p-2 rounded-lg hover:bg-zinc-800 text-zinc-400 transition-all disabled:opacity-30">
                                        <i data-lucide="undo-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>

                            <canvas id="doodleCanvas" class="w-full aspect-[4/3] cursor-crosshair bg-white"></canvas>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between text-zinc-500 text-xs px-2">
                        <div class="flex items-center gap-4">
                            <span class="flex items-center gap-1.5"><i data-lucide="mouse-pointer-2" class="w-3.5 h-3.5"></i> Draw on canvas</span>
                            <span class="flex items-center gap-1.5"><i data-lucide="wand-2" class="w-3.5 h-3.5"></i> AI will use your sketch</span>
                        </div>
                        <span id="canvasStatus">Ready to sketch</span>
                    </div>
                </div>

                <!-- Controls & Result (Right 1/3) -->
                <div class="space-y-6">
                    <!-- Prompt Card -->
                    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl space-y-4">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-zinc-300 flex items-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i>
                                What should this become?
                            </label>
                            <textarea id="promptInput" placeholder="Describe your masterpiece... (e.g., 'A majestic dragon in a mystical forest')" 
                                class="w-full h-32 bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-none placeholder:text-zinc-700"></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-zinc-300">Art Style</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="style-btn px-3 py-2 text-[10px] font-bold uppercase tracking-tighter border border-zinc-800 rounded-lg hover:border-indigo-500 transition-all active" data-style="Digital Art">Digital Art</button>
                                <button class="style-btn px-3 py-2 text-[10px] font-bold uppercase tracking-tighter border border-zinc-800 rounded-lg hover:border-indigo-500 transition-all" data-style="Oil Painting">Oil Painting</button>
                                <button class="style-btn px-3 py-2 text-[10px] font-bold uppercase tracking-tighter border border-zinc-800 rounded-lg hover:border-indigo-500 transition-all" data-style="Cyberpunk">Cyberpunk</button>
                                <button class="style-btn px-3 py-2 text-[10px] font-bold uppercase tracking-tighter border border-zinc-800 rounded-lg hover:border-indigo-500 transition-all" data-style="Watercolor">Watercolor</button>
                            </div>
                        </div>

                        <button id="generateBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold shadow-lg shadow-indigo-500/25 transition-all flex items-center justify-center gap-3 group">
                            <i data-lucide="wand-2" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                            Generate Masterpiece
                        </button>
                    </div>

                    <!-- Result Card -->
                    <div id="resultSection" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                            <div class="p-4 border-b border-zinc-800 bg-zinc-900/50 flex items-center justify-between">
                                <span class="text-xs font-bold text-zinc-400 uppercase tracking-wider">AI Generation</span>
                                <button id="downloadBtn" class="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400 transition-all">
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="aspect-square bg-zinc-950 flex items-center justify-center relative group">
                                <img id="resultImage" src="" alt="Generated Art" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Gallery Section -->
            <div class="mt-16 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="image" class="w-5 h-5 text-indigo-400"></i>
                        Recent Creations
                    </h2>
                </div>
                <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <!-- Gallery items will be injected here -->
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center text-zinc-600 text-[10px] uppercase tracking-[0.2em] pb-8">
            Powered by Gemini 3.1 & Node.js
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-zinc-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest text-indigo-400 animate-pulse">AI is dreaming...</p>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
